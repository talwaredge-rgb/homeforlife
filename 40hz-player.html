<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>40 Hz Gamma Sound Therapy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<!-- GA4: paste your snippet here once you have your property ID -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #faf9f7; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
.app { font-family: 'DM Mono', monospace; width: 100%; max-width: 480px; }
.title { font-family: 'DM Serif Display', serif; font-size: 32px; font-weight: 400; color: #1a1a18; line-height: 1.2; margin-bottom: 4px; }
.title em { font-style: italic; color: #888780; }
.subtitle { font-size: 11px; color: #aaa9a2; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2rem; }
.visualizer-wrap { border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; background: #f1efe8; }
canvas#viz { width: 100%; height: 60px; display: block; }
.play-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
#playBtn { width: 52px; height: 52px; border-radius: 50%; border: 0.5px solid #b4b2a9; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
#playBtn:hover { background: #f1efe8; }
#playBtn:active { transform: scale(0.96); }
.play-icon { width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-left: 16px solid #1a1a18; margin-left: 3px; }
.pause-icon { display: flex; gap: 4px; }
.pause-bar { width: 4px; height: 18px; background: #1a1a18; border-radius: 2px; }
.timer-display { font-size: 32px; font-weight: 300; color: #1a1a18; letter-spacing: -0.02em; }
.timer-label { font-size: 11px; color: #aaa9a2; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }
.session-row { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.session-btn { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; padding: 6px 14px; border-radius: 20px; border: 0.5px solid #b4b2a9; background: transparent; color: #888780; cursor: pointer; transition: all 0.15s; }
.session-btn:hover { background: #f1efe8; color: #1a1a18; }
.session-btn.active { background: #fff; color: #1a1a18; border-color: #5f5e5a; }
.section-label { font-size: 10px; color: #aaa9a2; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.controls { display: flex; flex-direction: column; gap: 1.1rem; margin-bottom: 1.5rem; }
.control-row { display: flex; align-items: center; gap: 12px; }
.control-label { font-size: 11px; color: #888780; letter-spacing: 0.06em; text-transform: uppercase; width: 72px; flex-shrink: 0; }
input[type=range] { flex: 1; accent-color: #5f5e5a; cursor: pointer; }
.control-val { font-size: 13px; color: #1a1a18; min-width: 44px; text-align: right; }
.divider { border: none; border-top: 0.5px solid #d3d1c7; margin: 1.25rem 0; }
.soundscape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
.scene-btn { font-family: 'DM Mono', monospace; font-size: 11px; padding: 10px 6px; border-radius: 8px; border: 0.5px solid #d3d1c7; background: #f1efe8; color: #888780; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: all 0.15s; line-height: 1.3; text-align: center; }
.scene-btn:hover { border-color: #b4b2a9; color: #1a1a18; }
.scene-btn.active { border-color: #5f5e5a; background: #fff; color: #1a1a18; }
.scene-icon { font-size: 18px; }
.mix-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
.info-strip { border-top: 0.5px solid #d3d1c7; padding-top: 1rem; display: flex; gap: 1.5rem; }
.info-block { flex: 1; }
.info-key { font-size: 10px; color: #aaa9a2; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.info-val { font-size: 13px; color: #888780; }
.headphone-note { font-size: 11px; color: #aaa9a2; margin-top: 1rem; padding: 8px 12px; border-left: 2px solid #b4b2a9; line-height: 1.5; }
.footer { margin-top: 2rem; font-size: 10px; color: #aaa9a2; text-align: center; letter-spacing: 0.06em; }
.footer a { color: #888780; text-decoration: none; }
@media (prefers-color-scheme: dark) {
  body { background: #1a1a18; }
  .title { color: #f1efe8; }
  .title em { color: #5f5e5a; }
  .subtitle { color: #444441; }
  .visualizer-wrap { border-color: #444441; background: #2c2c2a; }
  #playBtn { background: #2c2c2a; border-color: #5f5e5a; }
  #playBtn:hover { background: #444441; }
  .play-icon { border-left-color: #f1efe8; }
  .pause-bar { background: #f1efe8; }
  .timer-display { color: #f1efe8; }
  .timer-label { color: #444441; }
  .session-btn { border-color: #444441; color: #5f5e5a; }
  .session-btn:hover { background: #2c2c2a; color: #f1efe8; }
  .session-btn.active { background: #2c2c2a; color: #f1efe8; border-color: #888780; }
  .section-label { color: #444441; }
  .control-label { color: #5f5e5a; }
  .control-val { color: #f1efe8; }
  .divider { border-top-color: #444441; }
  .scene-btn { background: #2c2c2a; border-color: #444441; color: #5f5e5a; }
  .scene-btn:hover { border-color: #5f5e5a; color: #f1efe8; }
  .scene-btn.active { border-color: #888780; background: #444441; color: #f1efe8; }
  .info-strip { border-top-color: #444441; }
  .info-key { color: #444441; }
  .info-val { color: #5f5e5a; }
  .headphone-note { color: #444441; border-left-color: #444441; }
  .footer { color: #444441; }
  .footer a { color: #5f5e5a; }
}
</style>
</head>
<body>
<div class="app">
  <div class="title">40 Hz <em>Gamma</em><br>Sound Therapy</div>
  <div class="subtitle">Binaural beat · Gamma entrainment</div>
  <div class="visualizer-wrap">
    <canvas id="viz" width="800" height="120"></canvas>
  </div>
  <div class="play-row">
    <button id="playBtn" onclick="togglePlay()">
      <div id="playIcon" class="play-icon"></div>
    </button>
    <div>
      <div class="timer-display" id="timer">00:00</div>
      <div class="timer-label">elapsed</div>
    </div>
  </div>
  <div class="session-row">
    <button class="session-btn active" onclick="setDuration(this,10)">10 min</button>
    <button class="session-btn" onclick="setDuration(this,20)">20 min</button>
    <button class="session-btn" onclick="setDuration(this,30)">30 min</button>
    <button class="session-btn" onclick="setDuration(this,0)">Open</button>
  </div>
  <hr class="divider">
  <div class="section-label">Soundscape</div>
  <div class="soundscape-grid">
    <button class="scene-btn active" onclick="selectScene(this,'none')"><span class="scene-icon">∅</span>None</button>
    <button class="scene-btn" onclick="selectScene(this,'rain')"><span class="scene-icon">🌧</span>Rain</button>
    <button class="scene-btn" onclick="selectScene(this,'forest')"><span class="scene-icon">🌲</span>Forest</button>
    <button class="scene-btn" onclick="selectScene(this,'ocean')"><span class="scene-icon">🌊</span>Ocean</button>
    <button class="scene-btn" onclick="selectScene(this,'wind')"><span class="scene-icon">🍃</span>Wind</button>
    <button class="scene-btn" onclick="selectScene(this,'brown')"><span class="scene-icon">〰</span>Brown noise</button>
  </div>
  <div class="mix-row" id="mixRow" style="display:none;">
    <span class="control-label" style="width:72px;font-size:11px;color:#888780;text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;">Mix</span>
    <input type="range" min="0" max="100" value="60" step="1" id="mixSlider" oninput="setMix(this.value)" style="flex:1;"/>
    <span class="control-val" id="mixVal">60%</span>
  </div>
  <hr class="divider">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <div class="section-label" style="margin-bottom:0;">Tone controls</div>
    <button onclick="resetDefaults()" style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.05em;padding:4px 12px;border-radius:20px;border:0.5px solid #b4b2a9;background:transparent;color:#888780;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.background='#f1efe8';this.style.color='#1a1a18'" onmouseout="this.style.background='transparent';this.style.color='#888780'">↺ reset defaults</button>
  </div>
  <div class="controls">
    <div class="control-row">
      <span class="control-label">Volume</span>
      <input type="range" min="0" max="100" value="70" step="1" id="volSlider" oninput="setVolume(this.value)"/>
      <span class="control-val" id="volVal">70%</span>
    </div>
    <div class="control-row">
      <span class="control-label">Carrier</span>
      <input type="range" min="100" max="400" value="200" step="1" id="carrierSlider" oninput="setCarrier(this.value)"/>
      <span class="control-val" id="carrierVal">200 Hz</span>
    </div>
  </div>
  <div class="info-strip">
    <div class="info-block"><div class="info-key">Left ear</div><div class="info-val" id="leftFreq">200 Hz</div></div>
    <div class="info-block"><div class="info-key">Right ear</div><div class="info-val" id="rightFreq">240 Hz</div></div>
    <div class="info-block"><div class="info-key">Beat freq</div><div class="info-val">40 Hz</div></div>
  </div>
  <div class="headphone-note">Headphones required — binaural beats only work when each ear receives a separate frequency.</div>
  <div class="footer"><a href="https://homeforlife.us" target="_blank">HomeForLife</a></div>
</div>
<script>
let ctx, masterGain, leftOsc, rightOsc, analyser, animFrame;
let sceneGain = null, sceneNodes = [];
let playing = false, carrier = 200, volume = 0.7, mixLevel = 0.6;
let elapsed = 0, sessionDuration = 10 * 60, timerInterval = null;
let sessionOpen = false, currentScene = 'none';

function makeNoiseBuf(seconds) {
  const len = Math.ceil(ctx.sampleRate * seconds);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}
function makeBrownBuf(seconds) {
  const len = Math.ceil(ctx.sampleRate * seconds);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < len; i++) {
    const w = Math.random() * 2 - 1;
    d[i] = (last + 0.02 * w) / 1.02;
    last = d[i];
  }
  const peak = d.reduce((m, v) => Math.max(m, Math.abs(v)), 0);
  for (let i = 0; i < len; i++) d[i] /= peak;
  return buf;
}
function loopNoise(buf) {
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true; return src;
}
function buildScene(type) {
  clearScene();
  if (type === 'none' || !ctx) return;
  sceneGain = ctx.createGain();
  sceneGain.gain.setValueAtTime(mixLevel, ctx.currentTime);
  sceneGain.connect(masterGain);
  if (type === 'brown') {
    const src = loopNoise(makeBrownBuf(5));
    const g = ctx.createGain(); g.gain.setValueAtTime(1.0, ctx.currentTime);
    src.connect(g); g.connect(sceneGain); src.start();
    sceneNodes = [src]; return;
  }
  if (type === 'rain') {
    const specs = [{freq:600,Q:0.8,gain:0.5},{freq:1200,Q:0.6,gain:0.6},{freq:2400,Q:0.5,gain:0.5},{freq:4000,Q:0.4,gain:0.4},{freq:6000,Q:0.3,gain:0.3}];
    const nodes = [];
    specs.forEach(spec => {
      const src = loopNoise(makeNoiseBuf(3));
      const f = ctx.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.setValueAtTime(spec.freq, ctx.currentTime); f.Q.setValueAtTime(spec.Q, ctx.currentTime);
      const g = ctx.createGain(); g.gain.setValueAtTime(spec.gain, ctx.currentTime);
      src.connect(f); f.connect(g); g.connect(sceneGain);
      src.start(ctx.currentTime + Math.random() * 0.3); nodes.push(src);
    });
    sceneNodes = nodes; return;
  }
  if (type === 'ocean') {
    const nodes = [];
    for (let i = 0; i < 3; i++) {
      const src = loopNoise(makeNoiseBuf(4));
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.setValueAtTime(300 + i * 100, ctx.currentTime);
      const lfo = ctx.createOscillator();
      lfo.type = 'sine'; lfo.frequency.setValueAtTime(0.05 + i * 0.03, ctx.currentTime);
      const lfoG = ctx.createGain(); lfoG.gain.setValueAtTime(0.4, ctx.currentTime);
      const baseG = ctx.createGain(); baseG.gain.setValueAtTime(0.5, ctx.currentTime);
      lfo.connect(lfoG); lfoG.connect(baseG.gain);
      src.connect(lp); lp.connect(baseG); baseG.connect(sceneGain);
      src.start(ctx.currentTime + i * 1.5); lfo.start(); nodes.push(src, lfo);
    }
    sceneNodes = nodes; return;
  }
  if (type === 'forest') {
    const src = loopNoise(makeNoiseBuf(4));
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.setValueAtTime(3000, ctx.currentTime); f.Q.setValueAtTime(0.2, ctx.currentTime);
    const g = ctx.createGain(); g.gain.setValueAtTime(0.4, ctx.currentTime);
    src.connect(f); f.connect(g); g.connect(sceneGain); src.start();
    sceneNodes = [src]; scheduleChirps(); return;
  }
  if (type === 'wind') {
    const src = loopNoise(makeNoiseBuf(4));
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.setValueAtTime(400, ctx.currentTime); f.Q.setValueAtTime(0.4, ctx.currentTime);
    const lfo = ctx.createOscillator();
    lfo.type = 'sine'; lfo.frequency.setValueAtTime(0.12, ctx.currentTime);
    const lfoG = ctx.createGain(); lfoG.gain.setValueAtTime(200, ctx.currentTime);
    lfo.connect(lfoG); lfoG.connect(f.frequency);
    const g = ctx.createGain(); g.gain.setValueAtTime(0.7, ctx.currentTime);
    src.connect(f); f.connect(g); g.connect(sceneGain);
    src.start(); lfo.start(); sceneNodes = [src, lfo]; return;
  }
}
function scheduleChirps() {
  if (!playing || currentScene !== 'forest' || !sceneGain) return;
  const delay = 3 + Math.random() * 8;
  const t = ctx.currentTime + delay;
  const freqs = [2800, 3200, 3600, 4000];
  const baseF = freqs[Math.floor(Math.random() * freqs.length)];
  const osc = ctx.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(baseF, t);
  osc.frequency.linearRampToValueAtTime(baseF * 1.15, t + 0.06);
  osc.frequency.linearRampToValueAtTime(baseF, t + 0.12);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.25, t + 0.03); g.gain.linearRampToValueAtTime(0, t + 0.14);
  osc.connect(g); g.connect(sceneGain); osc.start(t); osc.stop(t + 0.2);
  setTimeout(scheduleChirps, delay * 1000);
}
function clearScene() {
  sceneNodes.forEach(n => { try { n.stop(); } catch(e){} });
  sceneNodes = [];
  if (sceneGain) { try { sceneGain.disconnect(); } catch(e){} sceneGain = null; }
}
function selectScene(btn, type) {
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); currentScene = type;
  document.getElementById('mixRow').style.display = type === 'none' ? 'none' : 'flex';
  if (playing && ctx) buildScene(type);
}
function setMix(val) {
  mixLevel = val / 100; document.getElementById('mixVal').textContent = val + '%';
  if (sceneGain) sceneGain.gain.setValueAtTime(mixLevel, ctx.currentTime);
}
function initAudio() {
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = ctx.createGain(); masterGain.gain.setValueAtTime(volume, ctx.currentTime);
  analyser = ctx.createAnalyser(); analyser.fftSize = 256;
  masterGain.connect(analyser); analyser.connect(ctx.destination);
  const merger = ctx.createChannelMerger(2);
  leftOsc = ctx.createOscillator(); leftOsc.type = 'sine'; leftOsc.frequency.setValueAtTime(carrier, ctx.currentTime);
  rightOsc = ctx.createOscillator(); rightOsc.type = 'sine'; rightOsc.frequency.setValueAtTime(carrier + 40, ctx.currentTime);
  const lG = ctx.createGain(); lG.gain.setValueAtTime(0.5, ctx.currentTime);
  const rG = ctx.createGain(); rG.gain.setValueAtTime(0.5, ctx.currentTime);
  leftOsc.connect(lG); rightOsc.connect(rG);
  lG.connect(merger, 0, 0); rG.connect(merger, 0, 1);
  merger.connect(masterGain); leftOsc.start(); rightOsc.start();
}
function togglePlay() {
  if (!playing) {
    if (!ctx) initAudio(); else ctx.resume();
    buildScene(currentScene); playing = true;
    document.getElementById('playIcon').outerHTML = '<div id="playIcon" class="pause-icon"><div class="pause-bar"></div><div class="pause-bar"></div></div>';
    timerInterval = setInterval(() => {
      elapsed++; updateTimer();
      if (!sessionOpen && elapsed >= sessionDuration) stopPlay();
    }, 1000);
    drawViz();
  } else { stopPlay(); }
}
function stopPlay() {
  clearScene(); if (ctx) ctx.suspend(); playing = false;
  clearInterval(timerInterval);
  document.getElementById('playIcon').outerHTML = '<div id="playIcon" class="play-icon"></div>';
  cancelAnimationFrame(animFrame); clearCanvas();
}
function updateTimer() {
  const m = Math.floor(elapsed / 60).toString().padStart(2,'0');
  const s = (elapsed % 60).toString().padStart(2,'0');
  document.getElementById('timer').textContent = m + ':' + s;
}
function setDuration(btn, mins) {
  document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); sessionOpen = mins === 0;
  if (mins > 0) { sessionDuration = mins * 60; elapsed = 0; updateTimer(); if (playing) stopPlay(); }
}
function setVolume(val) {
  volume = val / 100; document.getElementById('volVal').textContent = val + '%';
  if (masterGain) masterGain.gain.setValueAtTime(volume, ctx.currentTime);
}
function setCarrier(val) {
  carrier = parseInt(val);
  document.getElementById('carrierVal').textContent = carrier + ' Hz';
  document.getElementById('leftFreq').textContent = carrier + ' Hz';
  document.getElementById('rightFreq').textContent = (carrier + 40) + ' Hz';
  if (leftOsc) leftOsc.frequency.setValueAtTime(carrier, ctx.currentTime);
  if (rightOsc) rightOsc.frequency.setValueAtTime(carrier + 40, ctx.currentTime);
}
function drawViz() {
  const canvas = document.getElementById('viz');
  const c = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  function frame() {
    animFrame = requestAnimationFrame(frame);
    analyser.getByteTimeDomainData(buf);
    c.clearRect(0, 0, W, H); c.beginPath();
    c.strokeStyle = '#888780'; c.lineWidth = 1.5;
    const slice = W / buf.length; let x = 0;
    for (let i = 0; i < buf.length; i++) {
      const y = (buf[i] / 128.0) * (H / 2);
      if (i === 0) c.moveTo(x, y); else c.lineTo(x, y); x += slice;
    }
    c.stroke();
  }
  frame();
}
function resetDefaults() {
  // Reset volume to 70%
  setVolume(70);
  document.getElementById('volSlider').value = 70;
  // Reset carrier to 200Hz
  setCarrier(200);
  document.getElementById('carrierSlider').value = 200;
  // Reset mix to 60%
  setMix(60);
  document.getElementById('mixSlider').value = 60;
  // Reset soundscape to none
  const noneBtn = document.querySelector('.scene-btn');
  selectScene(noneBtn, 'none');
  // Reset session to 10 min
  const tenBtn = document.querySelector('.session-btn');
  setDuration(tenBtn, 10);
}

function clearCanvas() {
  const canvas = document.getElementById('viz');
  const c = canvas.getContext('2d');
  c.clearRect(0, 0, canvas.width, canvas.height);
  c.beginPath(); c.strokeStyle = '#d3d1c7'; c.lineWidth = 1;
  c.moveTo(0, 60); c.lineTo(800, 60); c.stroke();
}
clearCanvas();
</script>
</body>
